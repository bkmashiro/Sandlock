name: Security Tests

on:
  push:
    branches: [main]
    paths:
      - 'sandlock.c'
      - 'Makefile'
  
  pull_request:
    branches: [main]
    paths:
      - 'sandlock.c'
      - 'Makefile'

  workflow_dispatch:
    inputs:
      skip_bombs:
        description: 'Skip bomb tests'
        required: false
        default: 'false'
        type: boolean

jobs:
  security-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev python3
      
      - name: Build
        run: make
      
      - name: Show features
        run: ./sandlock --features
      
      - name: Basic security tests
        run: |
          echo "=== Network blocking ==="
          ! ./sandlock --no-network -- python3 -c "import socket; socket.socket()"
          
          echo "=== Fork blocking ==="
          ! ./sandlock --no-fork -- python3 -c "import os; os.fork()"
          
          echo "=== Ptrace blocking ==="
          ! ./sandlock -- python3 -c "import ctypes; ctypes.CDLL(None).ptrace(0,0,0,0)"
          
          echo "=== Memory limit ==="
          ! ./sandlock --mem 16 -- python3 -c "x=[0]*10000000"
          
          echo "=== Timeout ==="
          ! ./sandlock --timeout 2 -- sleep 10
          
          echo "=== CPU limit ==="
          ! ./sandlock --cpu 1 -- python3 -c "while True: pass"
          
          echo "=== File size limit ==="
          ! ./sandlock --fsize 1 -- python3 -c "open('/tmp/x','w').write('x'*2000000)"
          
          echo "All basic security tests passed!"
      
      - name: Landlock tests
        run: |
          if ./sandlock --features | grep -q "Landlock: available"; then
            echo "=== Landlock tests ==="
            
            # 需要授权 /usr (可执行文件) + /lib (库) + /tmp (工作目录)
            ./sandlock --landlock --rw /tmp --ro /usr --ro /lib --ro /lib64 \
              -- touch /tmp/test
            echo "✓ touch with landlock"
            
            ./sandlock --landlock --ro /usr --ro /lib --ro /lib64 \
              -- ls /usr >/dev/null
            echo "✓ ls with landlock"
            
            # 测试阻断 - cat /etc/passwd 应该失败 (没授权/etc)
            if ./sandlock --landlock --rw /tmp --ro /usr --ro /lib --ro /lib64 \
               -- cat /etc/passwd 2>/dev/null; then
              echo "✗ /etc should be blocked"
              exit 1
            else
              echo "✓ /etc blocked as expected"
            fi
            
            echo "Landlock tests passed!"
          else
            echo "Landlock not available on this runner, skipping"
          fi
      
      - name: Bomb tests
        if: ${{ github.event.inputs.skip_bombs != 'true' }}
        run: |
          echo "=== BOMB TESTS ==="
          echo "Each test has dual protection: sandlock limits + external timeout"
          echo ""
          
          echo "--- Fork bomb (5s limit) ---"
          timeout 10 ./sandlock --no-fork --timeout 5 -- python3 -c "
          import os
          while True:
              try: os.fork()
              except: break
          " 2>&1 || true
          echo "✓ Fork bomb contained"
          
          echo ""
          echo "--- Memory bomb (64MB limit, 5s timeout) ---"
          timeout 10 ./sandlock --mem 64 --timeout 5 -- python3 -c "
          x = []
          while True:
              x.append('x' * 1000000)
          " 2>&1 || true
          echo "✓ Memory bomb contained"
          
          echo ""
          echo "--- CPU bomb (2s CPU limit) ---"
          timeout 10 ./sandlock --cpu 2 --timeout 5 -- python3 -c "
          while True:
              x = 1+1
          " 2>&1 || true
          echo "✓ CPU bomb contained"
          
          echo ""
          echo "--- File bomb (1MB limit) ---"
          timeout 10 ./sandlock --fsize 1 --timeout 5 -- python3 -c "
          with open('/tmp/bomb', 'w') as f:
              while True:
                  f.write('x' * 1000000)
          " 2>&1 || true
          echo "✓ File bomb contained"
          
          echo ""
          echo "--- FD bomb (20 FD limit) ---"
          timeout 10 ./sandlock --nofile 20 --timeout 5 -- python3 -c "
          fds = []
          for i in range(1000):
              try: fds.append(open(f'/tmp/f{i}', 'w'))
              except: break
          " 2>&1 || true
          echo "✓ FD bomb contained"
          
          echo ""
          echo "=== All bomb tests passed! ==="
